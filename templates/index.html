<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FIFA Player Analysis Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1720;
      color: #e6edf3;
    }
    header {
      padding: 24px 32px;
      background: linear-gradient(90deg, #142a4c, #0f1720);
      border-bottom: 1px solid #24344a;
    }
    header h1 {
      margin: 0 0 4px 0;
      font-size: 24px;
      letter-spacing: 0.5px;
    }
    header p {
      margin: 0;
      color: #9db4cc;
      font-size: 14px;
    }
    .container {
      padding: 24px 32px;
    }
    .dashboard-frame {
      width: 100%;
      height: 850px;
      border: none;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }
    footer {
      text-align: center;
      padding: 16px;
      color: #6d84a0;
      font-size: 12px;
    }
    @media (max-width: 768px) {
      .dashboard-frame { height: 600px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>FIFA Player Analysis</h1>
    <p>Clubs, countries, ratings, market value, wages and positions — built from the FIFA 22 Kaggle dataset.</p>
  </header>

  <div class="container">
    <iframe
      class="dashboard-frame"
      src="{{ tableau_url }}?:embed=y&:showVizHome=no&:toolbar=bottom"
      allowfullscreen>
    </iframe>
  </div>

  <footer>Data source: FIFA 22 Complete Player Dataset (Kaggle) &middot; Dashboard built in Tableau</footer>
</body>
</html>
